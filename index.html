<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Video Player Preview</title>
  
  <style>
    /* Center the video player container neatly on your webpage */
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #f6f8fa; /* Standard light GitHub background tone */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 1. FIXED SIZING CONTAINER: Adjust max-width to change the display size on your page */
    .video-card-container {
      width: 100%;
      max-width: 340px;          /* Shrinks the player down so it isn't too big */
      border-radius: 14px;        /* Sleek modern rounded corners */
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); /* Soft drop shadow */
      background-color: #000000;  /* Fallback black background */
    }

    /* 2. PLAYER FRAMEWORK: Controls the shape and presentation of the video player */
    .custom-video-player {
      width: 100%;
      display: block;
      
      /* ADJUST RATIO HERE: 
         - Use 16 / 9 for horizontal widescreen
         - Use 9 / 16 for vertical smartphone/TikTok layout 
         - Use 1 / 1 for a perfect square */
      aspect-ratio: 16 / 9; 
      
      object-fit: cover; /* Prevents your preview image from stretching out of shape */
    }

    /* Styling browser-injected controls to blend cleanly with the layout */
    video::-webkit-media-controls-panel {
      background-image: linear-gradient(transparent, rgba(0,0,0,0.7));
    }
  </style>
</head>
<body>

  <!-- The main container holding your video setup -->
  <div class="video-card-container">
    
    <!-- 
      - 'controls' shows play/pause and the AirPlay button natively.
      - 'x-webkit-airplay="allow"' registers full permissions to cast to TVs or devices.
      - 'poster' sets the static image preview backdrop before clicking play.
    -->
    <video 
      controls 
      x-webkit-airplay="allow"
      poster="https://cdn.discordapp.com/attachments/1456401439122260212/1527357966888734941/ChatGPT_Image_Jul_16_2026_05_54_10_PM.png?ex=6a5a5e74&is=6a590cf4&hm=1802fee664f808c9240534fbe58c5907cc99e4947b8a006f293462b546001a88" 
      class="custom-video-player">
      
      <!-- Paste your direct Google Drive download link into the src attribute below -->
      <source src="https://drive.google.com/file/d/1Qo0L77NMlzFt-Ea4ywOe6BK157Y4mnAq/view?usp=drivesdk" type="video/mp4">
      
      Your browser does not support native video streaming.
    </video>

  </div>

</body>
</html>
